name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK to TFT
      id: upload
      run: |
        APK_PATH=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "APK not found!"
          exit 1
        fi
        
        RESPONSE=$(curl -X POST https://temp.joniartha.my.id/api/upload \
          -H "X-API-Key: ${{ secrets.TFT_API_KEY }}" \
          -F "file=@$APK_PATH" \
          -s)
        
        FILE_ID=$(echo $RESPONSE | grep -o '"id":"[^"]*' | cut -d'"' -f4)
        DOWNLOAD_URL="https://temp.joniartha.my.id/f/$FILE_ID"
        
        echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
        echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
    
    - name: Send to Discord
      run: |
        curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "content": "✅ **Android Build Complete**\n\n📦 APK: `${{ steps.upload.outputs.apk_name }}`\n🔗 Download: ${{ steps.upload.outputs.download_url }}\n⏱️ Build: #${{ github.run_number }}\n🔨 Commit: `${{ github.sha }}` by ${{ github.actor }}",
            "username": "GitHub Actions"
          }'